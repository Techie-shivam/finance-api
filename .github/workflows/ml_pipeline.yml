name: ML Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  ml-pipeline:
    runs-on: ubuntu-latest

    steps:

      # ----------------------------------------
      # Step 1: Pull your code
      # ----------------------------------------
      - name: Checkout code
        uses: actions/checkout@v4

      # ----------------------------------------
      # Step 2: Set up Python 3.12
      # ----------------------------------------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # ----------------------------------------
      # Step 3: Install all dependencies
      # ----------------------------------------
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      # ----------------------------------------
      # Step 4: Train the model
      # ----------------------------------------
      - name: Train model
        run: python src/models/train_classifier.py

      # ----------------------------------------
      # Step 5: Run tests
      # ----------------------------------------
      - name: Run model tests
        run: python src/models/test_model.py

      # ----------------------------------------
      # Step 6: Verify API starts without errors
      # ----------------------------------------
      - name: Check API starts
        run: |
          uvicorn src.api.serve:app --port 8000 &
          sleep 5
          curl -f http://localhost:8000/health
          echo "API is healthy ✅"


name: ML Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ml-pipeline:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Train model
        run: python src/models/train_classifier.py

      - name: Run tests
        run: python src/models/test_model.py

      - name: Check API starts
        run: |
          uvicorn src.api.serve:app --port 8000 &
          sleep 5
          curl -f http://localhost:8000/health

      - name: Build and push Docker image
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
          docker build -t ${{ secrets.DOCKER_USERNAME }}/finance-api:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/finance-api:latest